name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macos-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macos-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.32.1 --activate

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.tag.outputs.tag }}
          releaseName: Codex Quota Monitor ${{ steps.tag.outputs.tag }}
          releaseBody: |
            ## Codex Quota Monitor

            Bản release này hoàn tất rebrand từ Codex Switcher sang **Codex Quota Monitor** và đóng gói lại ứng dụng desktop theo nhận diện mới.

            ### Tính năng chính

            - Theo dõi quota Codex theo cả chu kỳ **5 giờ** và **7 ngày** trên từng tài khoản.
            - Quản lý nhiều tài khoản Codex trong một ứng dụng desktop duy nhất.
            - **Switch & Restart**: đổi tài khoản và khởi động lại runtime liên quan để áp dụng nhanh hơn.
            - Hỗ trợ các runtime chính: **VS Code + Codex extension**, **Codex app**, và nhận diện **Codex CLI** standalone.
            - Tự chặn switch nếu phát hiện **CLI standalone** đang chạy để tránh làm hỏng session đang dùng.
            - Hỗ trợ đăng nhập qua **OAuth** và import từ **auth.json**.
            - Hỗ trợ **refresh usage**, **warm-up request**, sắp xếp tài khoản và theo dõi trạng thái từng account.
            - Có **runtime log panel** trong ứng dụng để xem log thao tác switch, refresh và restart.

            ### Backup và tương thích dữ liệu

            - Export/import nhanh bằng định dạng slim mới của Codex Quota Monitor.
            - Backup đầy đủ có mã hóa để sao lưu toàn bộ store tài khoản.
            - Tự động migrate dữ liệu cũ từ thư mục `~/.codex-switcher` sang `~/.codex-quota-monitor`.
            - Vẫn đọc được backup legacy từ bản cũ để người dùng nâng cấp mà không mất dữ liệu.

            ### Thay đổi nhận diện

            - Tên ứng dụng, icon, package name, bundle metadata và release asset đã đổi sang **Codex Quota Monitor**.
            - Binary và installer của bản phát hành mới dùng nhận diện mới thay vì thương hiệu cũ.

            ### Gói phát hành

            - Windows: NSIS installer, MSI, updater archive
            - macOS: Apple Silicon và Intel
            - Linux: x64 bundle

            Nếu đang dùng bản cũ, chỉ cần cài đè hoặc tải bản mới; dữ liệu tài khoản sẽ được migrate tự động khi cần.
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
