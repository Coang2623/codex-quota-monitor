name: Build & Release

on:
  push:
    branches:
      - main

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macos-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macos-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          TAG="v$(python -c 'import json; print(json.load(open("package.json", encoding="utf-8"))["version"])')"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check if release tag already exists
        id: release_guard
        shell: bash
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.tag.outputs.tag }}" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Release tag ${{ steps.tag.outputs.tag }} already exists. Skipping production release."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Release tag ${{ steps.tag.outputs.tag }} is new. Continuing production release."
          fi

      - name: Setup Node.js
        if: steps.release_guard.outputs.should_release == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack pnpm
        if: steps.release_guard.outputs.should_release == 'true'
        run: |
          corepack enable
          corepack prepare pnpm@10.32.1 --activate

      - name: Install Rust
        if: steps.release_guard.outputs.should_release == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: steps.release_guard.outputs.should_release == 'true' && matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        if: steps.release_guard.outputs.should_release == 'true'
        run: pnpm install --frozen-lockfile

      - name: Validate version alignment
        if: steps.release_guard.outputs.should_release == 'true'
        shell: bash
        run: |
          PACKAGE_VERSION=$(python -c 'import json; print(json.load(open("package.json", encoding="utf-8"))["version"])')
          TAURI_VERSION=$(python -c 'import json; print(json.load(open("src-tauri/tauri.conf.json", encoding="utf-8"))["version"])')
          CARGO_VERSION=$(grep -m1 '^version = ' src-tauri/Cargo.toml | cut -d '"' -f 2)

          if [ "$PACKAGE_VERSION" != "$TAURI_VERSION" ] || [ "$PACKAGE_VERSION" != "$CARGO_VERSION" ]; then
            echo "Version mismatch detected:"
            echo "package.json=$PACKAGE_VERSION"
            echo "tauri.conf.json=$TAURI_VERSION"
            echo "Cargo.toml=$CARGO_VERSION"
            exit 1
          fi

      - name: Prepare release notes
        if: steps.release_guard.outputs.should_release == 'true'
        id: notes
        shell: bash
        run: |
          NOTES_FILE=".github/release-notes/${{ steps.tag.outputs.tag }}.md"
          DEFAULT_FILE=".github/release-notes/default.md"

          if [ -f "$NOTES_FILE" ]; then
            SOURCE_FILE="$NOTES_FILE"
          else
            SOURCE_FILE="$DEFAULT_FILE"
          fi

          {
            echo "body<<EOF"
            cat "$SOURCE_FILE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and release
        if: steps.release_guard.outputs.should_release == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.tag.outputs.tag }}
          releaseName: Codex Quota Monitor ${{ steps.tag.outputs.tag }}
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
